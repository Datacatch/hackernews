name: 🔥 Fetch HackerNews Top Stories

on:
  # ⏰ Runs every day at 8:00 AM UTC (1:30 PM IST)
  schedule:
    - cron: '30 2 * * *'

  # ✅ Allows you to trigger it manually from GitHub UI
  workflow_dispatch:

jobs:
  fetch-hn-stories:
    runs-on: ubuntu-latest

    # Give write permission so it can commit stories.json back to repo
    permissions:
      contents: write

    steps:
      # Step 1: Checkout your repo
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Cache pip packages (speeds up future runs)
      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install dependencies
      - name: 📥 Install Dependencies
        run: pip install -r requirements.txt

      # Step 5: Run the HN fetcher script
      - name: 🚀 Run HackerNews Fetcher
        run: python fetch_hn.py

      # Step 6: Commit and push stories.json back to repo
      - name: 💾 Commit stories to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stories.json
          git diff --staged --quiet || git commit -m "🔄 Auto-update: HN top stories $(date +'%Y-%m-%d')"
          git push