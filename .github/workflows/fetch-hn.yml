name: 🔥 Fetch HackerNews Top Stories

on:
  schedule:
    - cron: '0 4 * * *'   # 4:00 AM UTC = 9:30 AM IST daily
  workflow_dispatch:        # Manual trigger from GitHub UI
  push:
    branches:
      - main                # Also runs on push (keeps repo active)

jobs:
  fetch-and-email:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 🕐 Print Run Time
        run: |
          echo "=============================="
          echo "UTC  time: $(date -u)"
          echo "IST  time: $(TZ='Asia/Kolkata' date)"
          echo "=============================="

      - name: 📥 Checkout Repository
        uses: actions/checkout@v5

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 📥 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Fetch Stories & Send Email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python fetch_hn.py

      - name: 💾 Commit stories.json to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stories.json
          git diff --staged --quiet || git commit -m "🔄 Auto-update: HN top stories $(date +'%Y-%m-%d')"
          git push